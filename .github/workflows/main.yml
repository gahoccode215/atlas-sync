name: OptiBot Daily Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r optibot-uploader/requirements.txt

      - name: Restore manifest cache
        uses: actions/cache/restore@v4
        with:
          path: optibot-uploader/.manifest.json
          key: optibot-manifest-${{ github.run_id }}
          restore-keys: |
            optibot-manifest-

      - name: Step 1 - Scrape Zendesk articles
        run: |
          cd ingestor-service
          mvn clean package -DskipTests -q
          java -jar target/*.jar

      - name: Step 2 - Upload delta to Vector Store
        run: python optibot-uploader/upload_to_vector_store.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MARKDOWN_DIR: ingestor-service/articles
          VECTOR_STORE_NAME: optibot-knowledge-base

      - name: Save manifest cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: optibot-uploader/.manifest.json
          key: optibot-manifest-${{ github.run_id }}

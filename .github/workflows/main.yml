name: OptiBot Daily Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-optibot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('ingestor-service/pom.xml') }}

      - name: Build Java scraper
        run: |
          cd ingestor-service
          mvn clean package -DskipTests -q

      - name: Install Python dependencies
        run: |
          cd optibot-uploader
          pip install -r requirements.txt

      - name: Run daily job
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ARTICLES_DIR: ${{ github.workspace }}/ingestor-service/articles
          CHROMA_DIR: ${{ github.workspace }}/optibot-uploader/chroma_db
          STATE_FILE: ${{ github.workspace }}/optibot-uploader/state.json
          JAR_PATH: ${{ github.workspace }}/ingestor-service/target/ingestor-service-0.0.1-SNAPSHOT.jar
        run: |
          cd optibot-uploader
          python main.py 2>&1 | tee job_log.txt

      - name: Upload log artifact
        if: always()    # upload kể cả khi job fail
        uses: actions/upload-artifact@v4
        with:
          name: job-log-${{ github.run_number }}
          path: optibot-uploader/job_log.txt
          retention-days: 30
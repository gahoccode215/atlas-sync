name: OptiBot Daily Scraper

on:
  schedule:
    - cron: '0 2 * * *'   # 2AM UTC mỗi ngày
  workflow_dispatch:        # cho phép chạy thủ công để test

jobs:
  run-optibot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('ingestor-service/pom.xml') }}

      - name: Build Java scraper
        run: |
          cd ingestor-service
          mvn clean package -DskipTests -q

      - name: Install Python dependencies
        run: |
          cd optibot-uploader
          pip install -r requirements.txt

      - name: Run daily job
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ARTICLES_DIR: ../ingestor-service/articles
          CHROMA_DIR: ./chroma_db
          STATE_FILE: ./state.json
          JAR_PATH: ../ingestor-service/target/ingestor-service-0.0.1-SNAPSHOT.jar
        run: |
          cd optibot-uploader
          python main.py